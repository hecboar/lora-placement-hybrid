# Conda environment for "Where Should LoRA Go?"
#
# Exact run-time versions captured in logs/environment_snapshot.json
# (experiment date 2026-04-20, Python 3.11.10, NVIDIA RTX 4090, CUDA 12.4, bf16).
#
# NOTE: transformers / peft / trl were PRE-RELEASE (.dev0) builds installed from
# source (Qwen3.5 / Falcon-H1 support was not yet in stable releases). The exact
# ".dev0" strings may not resolve on PyPI; install from the matching git commits
# or use the current stable releases that support these architectures.

name: lora-placement-hybrid
channels:
  - conda-forge
dependencies:
  - python=3.11.10
  - pip
  - pip:
      # --- Core deep-learning stack (exact run-time versions) ---
      - torch==2.4.1                 # +cu124
      - transformers==5.6.0.dev0     # pre-release; install from source (see note)
      - peft==0.19.2.dev0            # pre-release; adapter metadata: 0.18.2.dev0@07a1db6
      - trl==1.3.0.dev0              # pre-release; install from source (see note)
      - datasets==4.8.4
      # --- Not captured in the snapshot (pin from your environment) ---
      - accelerate                   # replace with exact version
      - bitsandbytes                 # 8-bit Adam optimizer; replace with exact version
      # --- Scientific / data ---
      - numpy                        # replace with exact version
      - pandas                       # replace with exact version
      - scipy                        # replace with exact version
      - scikit-learn                 # replace with exact version
      # --- Plotting ---
      - matplotlib                   # replace with exact version
      # --- Utilities ---
      - tqdm
      - jupyter
